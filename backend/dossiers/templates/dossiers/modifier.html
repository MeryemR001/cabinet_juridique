<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un Dossier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Modifier le Dossier : {{ dossier.nom }}</h2>
    <hr>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_nom" class="form-label">Nom du dossier</label>
            {{ form.nom }}
        </div>
        <div class="mb-3">
            <label for="id_client" class="form-label">Client</label>
            {{ form.client }}
        </div>
        <div class="mb-3">
            <label for="id_avocat" class="form-label">Avocat assigné</label>
            {{ form.avocat }}
        </div>
        <div class="mb-3">
            <label for="id_statut" class="form-label">Statut</label>
            {{ form.statut }}
        </div>
        <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
        <a href="{% url 'liste_dossiers' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
</body>
</html>
