<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une Audience</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Ajouter une Audience</h2>
    <form method="POST">
        {% csrf_token %}

        <!-- Affiche tous les champs du formulaire automatiquement -->
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success">Ajouter</button>
        <a href="{% url 'liste_audiences' %}" class="btn btn-secondary">Retour à la liste</a>
    </form>
</div>
</body>
</html>
