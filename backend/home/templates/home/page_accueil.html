<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cabinet Juridique</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #c9a86a;
        }

        .navbar nav a {
            margin: 0 15px;
            color: #ddd;
            text-decoration: none;
            transition: 0.3s;
        }

        .navbar nav a:hover {
            color: #c9a86a;
        }

        /* BUTTON */
        .btn {
            background: #c9a86a;
            padding: 8px 18px;
            border-radius: 6px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: url("https://images.unsplash.com/photo-1589829545856-d10d557cf95f") center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
        }

        .hero-content {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 25px;
        }

        .btn-primary {
            background: #c9a86a;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #e0c08b;
        }

        /* SERVICES */
        .services {
            padding: 80px 50px;
            text-align: center;
        }

        .services h2 {
            font-size: 32px;
            margin-bottom: 40px;
        }

        /* GRID */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            transition: 0.3s;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-8px);
            background: #c9a86a;
            color: black;
        }
    </style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">⚖️ LexGuard</div>
    <nav>
        <a href="{% url 'dashboard' %}">Dashboard</a>
       
        
    </nav>
    <a href="/admin" class="btn">Admin</a>
</header>

<!-- HERO -->
<section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
        <h1>Cabinet Juridique Digital</h1>
   
        <a href="/admin" class="btn-primary">Commencer</a>
    </div>
</section>


</body>
</html>
